<!DOCTYPE html SYSTEM "http://www.thymeleaf.org/dtd/xhtml1-strict-thymeleaf-4.dtd">

<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Students</title>
    <style>
        .error{color:red;}

    </style>
</head>
<body>

<p>Please provide student info</p>

<form action="#" th:action="@{/student/save}" th:object="${student}" method="POST">
    <div th:if="${#fields.hasErrors('*')}" class="error">
        <p>Please Correct Errors Below:</p>
    </div>

    <input type="hidden" th:field="*{id}"> <br/>

    <table>
        <tr>
            <td>First Name:</td>
            <td><input type="text" th:field="*{firstName}"></td>
            <td th:if="${#fields.hasErrors('firstName')}" th:errors="*{firstName}" th:errorClass="error"></td>
        </tr>
        <tr>
            <td>Last Name:</td>
            <td><input type="text" th:field="*{lastName}"></td>
            <td th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}" th:errorClass="error"></td>
        </tr>
        <tr>
            <td>School Name:</td>
            <td><input type="text" th:field="*{schoolName}"></td>
            <td th:if="${#fields.hasErrors('schoolName')}" th:errors="*{schoolName}" th:errorClass="error"></td>
        </tr>
    </table>

    <input type="submit" value="Save"/>
</form>

</body>
</html>
